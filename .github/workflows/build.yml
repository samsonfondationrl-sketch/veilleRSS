name: Générer RSS Québec (FR) - Flux combiné

on:
  schedule:
    - cron: "0 10 * * *" # Tous les jours à 10:00 UTC (~06:00 au Québec selon la saison)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rss-feed
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Générer le flux RSS
        run: |
          python generate_rss.py

      - name: S'assurer que GitHub Pages ne tente pas Jekyll
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Commit et push du flux
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/feed.xml docs/.nojekyll

          git status
          git commit -m "Mise à jour du flux RSS" || echo "Aucun changement"
          git push
