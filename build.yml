name: Générer RSS Québec (FR) - Flux combiné

on:
  schedule:
    - cron: "0 10 * * *"  # tous les jours 10:00 UTC (~06:00 au Québec selon saison)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate RSS
        run: |
          python generate_rss.py

      - name: Commit feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git commit -m "Mise à jour du flux RSS" || echo "Aucun changement"
          git push
